<!DOCTYPE html>
<html lang="pt">

<head>

    <!-- Fonte -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">

    <!-- Estilo -->
    <style>
        /* White mode */
        :root {
            --color-appMain: #f0f4f9;
            --color-appCont: #ffffff;
            --color-appText: #1f1f1f;

            --color-buttonMain: #0b57d0;
            --color-buttonHover: #1e64d4;
            --color-buttonText: #ffffff;
        }

        .icon-docs {
            color: #4285f4;
        }

        .icon-sheets {
            color: #34a853;
        }

        .icon-slides {
            color: #fbbc04;
        }

        .icon-forms {
            color: #673ab7;
        }

        .icon-file {
            color: #4958ad;
        }

        .icon-folder {
            color: #444746;
        }

        .icon-success {
            color: #179b4e;
        }

        .icon-error {
            color: #b73434;
        }

        /* Dark mode */
        @media (prefers-color-scheme: dark) {
            :root {
                --color-appMain: #1e1f20;
                --color-appCont: #0e0e0e;
                --color-appText: #e3e3e3;

                --color-buttonMain: #a8c7fa;
                --color-buttonHover: #9bbbef;
                --color-buttonText: #062e6f;
            }

            .icon-docs {
                color: #9ac0fd;
            }

            .icon-sheets {
                color: #89cb9b;
            }

            .icon-slides {
                color: #f4b503;
            }

            .icon-forms {
                color: #c58af9;
            }

            .icon-file {
                color: #2a7ce8;
            }

            .icon-folder {
                color: #c4c7c5;
            }

            .icon-success {
                color: #21c063;
            }

            .icon-error {
                color: #f74848;
            }
        }



        /* Regras globais */
        * {
            box-sizing: border-box;
        }

        *:empty {
            margin: 0;
            padding: 0;
        }

        *[href=""] {
            display: none !important;
        }



        /* Corpo do site */
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            position: relative;

            margin: 0;
            padding: 20px;
            width: 100vw;
            height: 100vh;

            background-color: var(--color-appMain);
            color: var(--color-appText);

            font-family: "Open Sans", sans-serif;
        }

        h2 {
            font-size: 20px;
        }

        p {
            font-size: 17px;
        }

        /* Card de conteúdo */
        .content {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;

            border-radius: 20px;
            padding: 20px;
            background-color: var(--color-appCont);
        }

        /* Container de ícone */
        .icon-wrapper {
            width: 70px;
            height: 70px;
            position: relative;
        }

        /* Maximiza SVG no seu container */
        svg {
            width: 100%;
            height: 100%;
        }

        /* Container do ícone de status */
        .status {
            position: absolute;
            right: -2px;
            bottom: -2px;

            width: 30px;
            height: 30px;
            border-radius: 100%;

            background: var(--color-appCont);
            background-position: center;
        }

        /* Container de animação de loading */
        .loading {
            background: radial-gradient(var(--color-buttonMain) 0,
                    var(--color-buttonMain) 13px,
                    var(--color-appCont) 13px,
                    var(--color-appCont) 100%);
            animation: loading 1s ease infinite;
        }


        /* Animação de loading */
        @keyframes loading {
            0% {
                box-shadow: inset 0 0 0 3px var(--color-appCont);
            }

            50% {
                box-shadow: inset 0 0 0 6px var(--color-appCont);
            }

            100% {
                box-shadow: inset 0 0 0 3px var(--color-appCont);
            }
        }


        .button {
            display: block;
            background-color: var(--color-buttonMain);

            margin: 20px;
            padding: 7px 25px;
            border-radius: 20px;

            text-decoration: none;
            color: var(--color-buttonText);
            font-weight: 600;
            font-size: 15px;

            &:hover {
                background-color: var(--color-buttonHover);
            }
        }

        .credits {
            position: absolute;
            bottom: 10px;
            left: 0;

            width: 100%;
            text-align: center;

            opacity: 30%;
            color: var(--color-appText);
            font-size: 10px;
        }
    </style>

</head>


<body>
    <div class="content">

        <div class="icon-wrapper">
            <div class="icon"></div>
            <div class="status loading"></div>
        </div>

        <h2 class="info-main"></h2>
        <p class="info-details"></p>
        <a class="button" href="" target="_blank">Abrir arquivo</a>

    </div>

    <footer>
        <a class="credits" href="https://github.com/DaniFluffyLab/AdvancedCopyURL.gs" target="_blank">AdvancedCopyURL.gs
            por DaniFluffyDev ♥</a>
    </footer>

    <script>

        /** Obtém o HTML de um SVG. 
         * @param {string} - Identificador do SVG
        */
        function svg(icon) {
            switch (icon) {
                case "docs": return '<svg xmlns="http://www.w3.org/2000/svg" height="48px" viewBox="0 -960 960 960" width="48px" fill="currentColor"><path d="M325.69-481.46h308.62v-53.39H325.69v53.39Zm0 123.38h308.62v-53.38H325.69v53.38Zm0 123.39h188.62v-53.39H325.69v53.39ZM235.69-84q-28.34 0-49.51-21.18Q165-126.35 165-154.69v-650.62q0-28.34 21.18-49.51Q207.35-876 235.69-876h343.54L795-661.23v506.54q0 28.34-21.18 49.51Q752.65-84 724.31-84H235.69Zm326.85-561.77h174.07L562.54-817.61v171.84Z"/></svg>';
                case "error": return '<svg width="100%" height="100%" viewBox="0 0 48 48" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xml:space="preserve" xmlns:serif="http://www.serif.com/" style="fill: currentColor"><g transform="matrix(0.040714,0,0,0.040714,4.457402,43.542598)"><path d="M249,-186L186,-249L417,-480L186,-710L249,-774L480,-544L711,-774L774,-710L544,-480L774,-249L711,-186L480,-416L249,-186Z" style="fill-rule:nonzero;"/></g></svg>';
                case "file": return '<svg xmlns="http://www.w3.org/2000/svg" height="48px" viewBox="0 -960 960 960" width="48px" fill="currentColor"><path d="M144.69-32q-28.25 0-49.47-20.9T74-102.69v-583.92h58.39v583.92q0 4.61 3.84 8.46 3.85 3.84 8.46 3.84h461.92V-32H144.69Zm156.77-156.77q-28.25 0-49.47-20.9t-21.22-49.79v-599.85q0-28.25 21.22-49.47T301.46-930h324.23L850-704.69v445.23q0 28.89-21.22 49.79t-49.47 20.9H301.46ZM596-678.23h195.61L596-871.61v193.38Z"/></svg>';
                case "folder": return '<svg xmlns="http://www.w3.org/2000/svg" height="48px" viewBox="0 -960 960 960" width="48px" fill="currentColor"><path d="M154.69-164q-28.34 0-49.51-21.17Q84-206.33 84-234.69v-490.62q0-28.36 21.18-49.52Q126.35-796 154.69-796h239.46l78.39 78.39h332.77q28.36 0 49.52 21.16Q876-675.28 876-646.92v412.23q0 28.36-21.17 49.52Q833.67-164 805.31-164H154.69Z"/></svg>';
                case "forms": return '<svg xmlns="http://www.w3.org/2000/svg" height="48px" viewBox="0 -960 960 960" width="48px" fill="currentColor"><path d="M332.54-293.45q10.23-9.76 10.23-24.35 0-14.59-10.26-24.82t-24.84-10.23q-14.59 0-24.32 10.26t-9.73 24.85q0 14.59 9.75 24.32 9.76 9.73 24.35 9.73 14.59 0 24.82-9.76Zm0-162.23q10.23-9.76 10.23-24.35 0-14.59-10.26-24.82t-24.84-10.23q-14.59 0-24.32 10.26t-9.73 24.85q0 14.59 9.75 24.32 9.76 9.73 24.35 9.73 14.59 0 24.82-9.76Zm0-163.23q10.23-9.76 10.23-24.35 0-14.59-10.26-24.82t-24.84-10.23q-14.59 0-24.32 10.26t-9.73 24.85q0 14.59 9.75 24.32 9.76 9.73 24.35 9.73 14.59 0 24.82-9.76Zm102.61 330.83h240.54v-58.38H435.15v58.38Zm0-163.23h240.54v-58.38H435.15v58.38Zm0-162.23h240.54v-58.38H435.15v58.38ZM197.69-127q-28.61 0-49.65-21.04T127-197.69v-564.62q0-28.61 21.04-49.65T197.69-833h564.62q28.61 0 49.65 21.04T833-762.31v564.62q0 28.61-21.04 49.65T762.31-127H197.69Z"/></svg>';
                case "ok": return '<svg xmlns="http://www.w3.org/2000/svg" height="48px" viewBox="0 -960 960 960" width="48px" fill="currentColor"><path d="M400-295 232-464l65-64 103 103 264-263 64 64-328 329Z"/></svg>';
                case "sheets": return '<svg xmlns="http://www.w3.org/2000/svg" height="48px" viewBox="0 -960 960 960" width="48px" fill="currentColor"><path d="M190-99q-37.18 0-64.09-26.91Q99-152.82 99-190v-580q0-37.59 26.91-64.79Q152.82-862 190-862h580q37.59 0 64.79 27.21Q862-807.59 862-770v580q0 37.18-27.21 64.09Q807.59-99 770-99H190Zm245-252H190v161h245v-161Zm91 0v161h244v-161H526Zm-91-92v-161H190v161h245Zm91 0h244v-161H526v161ZM190-695h580v-75H190v75Z"/></svg>';
                case "slides": return '<svg xmlns="http://www.w3.org/2000/svg" height="48px" viewBox="0 -960 960 960" width="48px" fill="currentColor"><path d="M209-289h542v-382H209v382Zm-60 151q-37.17 0-64.09-26.91Q58-191.82 58-229v-502q0-37.59 26.91-64.79Q111.83-823 149-823h662q37.59 0 64.79 27.21Q903-768.59 903-731v502q0 37.18-27.21 64.09Q848.59-138 811-138H149Zm0-91h662v-502H149v502Zm0 0v-502 502Zm156-164 92.16-125.04 61.05 81.61L541-547l114 154H305Z"/></svg>';
                default: throw Error("SVG identifier not found.")
            }
        }

        /** Executa uma função do backend do Google Apps Script em um Webapp, com retries configuráveis.
         * @param {String} functionName - Nome da função no backend
         * @param {...*} params - Parâmetros da função no backend
         * 
         * @author DaniFluffyDev
         * @see {@link https://github.com/DaniFluffyLab/snippets}
         * 
         */
        async function GS(functionName, ...params) {
            const maxRetries = 1;
            const delayMs = 10000;

            for (let attempt = 1; attempt <= maxRetries; attempt++) {
                try {
                    // Tenta executar a função do Google
                    return await new Promise((resolve, reject) => {
                        google.script.run
                            .withSuccessHandler(resolve)
                            .withFailureHandler(reject)
                        [functionName](...params);
                    });
                } catch (error) {

                    // Se chegou na última tentativa, lança o erro definitivamente
                    if (attempt === maxRetries) {
                        throw error;
                    }

                    // Loga o aviso no console
                    console.warn(`Erro na função '${functionName}' (Tentativa ${attempt}/${maxRetries}). Retentando em 10s... Detalhes:`, error);

                    // Aguarda 10 segundos antes da próxima iteração do loop
                    await new Promise(resolve => setTimeout(resolve, delayMs));
                }
            }
        }

        async function run() {


            // Parâmetros de URL
            let params = <?!= JSON.stringify(params) ?>

            // Obtém elementos HTML
            let icon = document.querySelector(".icon")
            let status = document.querySelector(".status")
            let main = document.querySelector(".info-main")
            let details = document.querySelector(".info-details")
            let button = document.querySelector(".button")

            try {
                // Define icone
                icon.insertAdjacentHTML("beforeend", svg(params.type))
                icon.classList.add(`icon-${params.type}`)

                // Define título
                main.textContent = `Criando ${params.name || "arquivo"}...`

                // Solicita criar novo arquivo
                let newFile = await GS("newFile", params)

                // Define HTML caso sucesso
                if (newFile.status === 200 || newFile.status === 201) {
                    main.textContent = `${params.name || "Arquivo"} criado.`                        // Atualiza nome
                    if (newFile.observation) details.textContent = `Obs: ${newFile.observation}`    // Define observações se houver
                    status.classList.remove("loading")                                              // Remove loading
                    status.classList.add("icon-success")                                            // Adiciona classe de sucesso
                    status.insertAdjacentHTML("beforeend", svg("ok"))                               // Define icone de sucesso
                    button.href = newFile.response                                                  // Define URL do botão de abrir
                }

                // Retorna erro
                if (newFile.status === 500) throw Error(newFile.response)

            } catch (e) {
                main.textContent = `Erro ao criar ${params.name || "Arquivo"}.` // Atualiza nome
                details.textContent = e.message                                 // Define observações se houver
                status.classList.remove("loading")                              // Remove loading
                status.classList.add("icon-error")                              // Adiciona classe de erro
                status.insertAdjacentHTML("beforeend", svg("error"))            // Define icone de erro
            }
        }

        // Executa site
        run()

    </script>
</body>

</html>
